<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Void | VoidWeb Solutions</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="The page you are looking for does not exist in this sector of the void.">
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" href="logo.png">

    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #22d3ee; /* Cyan 400 */
            --bg-dark: #050505;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e2e8f0;
            overflow: hidden; /* Prevent scrolling on 404 */
            cursor: auto;
        }

        @media (min-width: 768px) {
            body { cursor: none; }
        }

        h1, .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Background Canvas */
        #void-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.8; /* Slightly more opaque for 404 */
            pointer-events: none;
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: white;
        }
        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }

        body:has(a:hover) .cursor-outline {
            width: 60px;
            height: 60px;
            background-color: rgba(34, 211, 238, 0.1);
            border-color: var(--primary);
        }

        /* Glitch Effect for 404 text */
        .glitch {
            position: relative;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }
        .glitch::before {
            color: #0ea5e9;
            z-index: -1;
            left: 2px;
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }
        .glitch::after {
            color: #22d3ee;
            z-index: -2;
            left: -2px;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 20% 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); }
            20% { clip-path: inset(30% 0 20% 0); }
            40% { clip-path: inset(70% 0 10% 0); }
            60% { clip-path: inset(20% 0 50% 0); }
            80% { clip-path: inset(50% 0 30% 0); }
            100% { clip-path: inset(5% 0 80% 0); }
        }
    </style>
</head>
<body class="antialiased selection:bg-cyan-500/30">

    <!-- Custom Cursor -->
    <div class="cursor-dot hidden md:block"></div>
    <div class="cursor-outline hidden md:block"></div>

    <!-- Background Canvas -->
    <canvas id="void-canvas"></canvas>

    <!-- Logo (Top Left) -->
    <div class="fixed top-0 left-0 p-6 md:p-8 z-50">
        <a href="/" class="flex items-center gap-2 group interactive">
            <svg width="28" height="28" viewBox="0 0 100 100" class="w-8 h-8">
                <circle cx="50" cy="50" r="48" stroke="#0ea5e9" stroke-width="2" fill="none" class="opacity-40"/>
                <circle cx="50" cy="50" r="28" stroke="#22d3ee" stroke-width="6" fill="none" class="opacity-80"/>
                <circle cx="50" cy="50" r="18" fill="#22d3ee"/>
            </svg>
            <span class="text-sm font-display font-bold tracking-widest text-white uppercase hidden sm:block">Return Home</span>
        </a>
    </div>

    <!-- Main Content -->
    <main class="relative z-10 w-full h-screen flex flex-col items-center justify-center px-6 text-center">
        <!-- Error Code -->
        <h1 class="text-8xl md:text-[12rem] font-display font-bold text-white leading-none tracking-tighter mb-4 glitch" data-text="404">
            404
        </h1>
        
        <!-- Status Badge -->
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-red-500/30 text-red-400 text-xs font-mono mb-8 tracking-widest uppercase backdrop-blur-md">
            <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
            Signal Lost
        </div>

        <h2 class="text-2xl md:text-3xl text-gray-300 font-light mb-8 max-w-lg">
            You've drifted too far into the void. This sector does not exist.
        </h2>

        <!-- Return Button -->
        <a href="/" class="interactive group relative px-8 py-4 bg-transparent border border-cyan-500 text-cyan-400 font-bold font-display tracking-widest uppercase overflow-hidden text-sm md:text-base transition-colors duration-300 hover:border-transparent">
            <span class="relative z-10 group-hover:text-black transition-colors duration-300 flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform"></i>
                Re-establish Connection
            </span>
            <div class="absolute inset-0 bg-cyan-500 transform scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-right"></div>
        </a>
    </main>

    <script>
        // Initialize Icons
        window.addEventListener('load', () => {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });

        // Custom Cursor Logic
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');

        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            if (cursorDot) {
                cursorDot.style.left = `${posX}px`;
                cursorDot.style.top = `${posY}px`;
            }

            if (cursorOutline) {
                cursorOutline.animate({
                    left: `${posX}px`,
                    top: `${posY}px`
                }, { duration: 500, fill: "forwards" });
            }
        });

        // 404 Specific Void Vortex Canvas (Erratic behavior)
        const canvas = document.getElementById('void-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let centerX, centerY;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // 404 Rings configuration (More chaotic, red/cyan mix)
        const rings = [];
        const numRings = 20;
        
        for(let i=0; i<numRings; i++) {
            rings.push({
                radius: Math.random() * (Math.max(width, height) * 0.8), // Scrambled initial radii
                angle: Math.random() * Math.PI * 2,
                // Erratic speeds
                speed: (Math.random() - 0.5) * 0.01,
                // Occasional red tint to signify error
                color: Math.random() > 0.8 ? 'rgba(239, 68, 68, 0.08)' : 'rgba(34, 211, 238, 0.05)',
                lineWidth: Math.random() * 3 + 0.5,
                // Oscillation factor
                wobbleSpeed: Math.random() * 0.005
            });
        }

        function animate() {
            // Darker trail effect for 404
            ctx.fillStyle = 'rgba(5, 5, 5, 0.15)';
            ctx.fillRect(0, 0, width, height);

            const time = Date.now();

            rings.forEach((ring, index) => {
                ring.angle += ring.speed;
                
                // Aggressive wobble for 404
                const wobble = Math.sin(time * ring.wobbleSpeed + index) * 30;
                
                ctx.beginPath();
                ctx.ellipse(
                    centerX, 
                    centerY, 
                    Math.abs(ring.radius + wobble), // Prevent negative radius
                    Math.abs(ring.radius * 0.5 - wobble), 
                    ring.angle, 
                    0, 
                    Math.PI * 2
                );
                ctx.strokeStyle = ring.color;
                ctx.lineWidth = ring.lineWidth;
                ctx.stroke();
            });

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
